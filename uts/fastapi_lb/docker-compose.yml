services:
  fastapi_app:
    build:
      context: .
      network: host
  nginx:
    image: docker.io/library/nginx:latest
    ports:
      - "8080:80" # <--- Diubah di sini: Port Windows 8080 diarahkan ke Port Nginx 80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fastapi_app
